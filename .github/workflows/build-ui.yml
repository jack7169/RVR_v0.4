name: Build Web UI

on:
  push:
    branches: [main]
    paths:
      - 'www-next/**'
      - '.github/workflows/build-ui.yml'
  pull_request:
    branches: [main]
    paths:
      - 'www-next/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: www-next/package-lock.json

      - name: Install dependencies
        working-directory: www-next
        run: npm ci

      - name: Type check
        working-directory: www-next
        run: npx tsc -b

      - name: Build
        working-directory: www-next
        run: npm run build

      - name: Clean stale chunks and commit
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Find all asset filenames referenced by the new index.html and main JS
          MAIN_JS=$(grep -oE 'assets/index-[^"]+\.js' www/index.html | sed 's|assets/||')
          REFERENCED=$(grep -oE '[A-Za-z]+-[A-Za-z0-9_-]+\.(js|css)' www/index.html www/assets/$MAIN_JS 2>/dev/null | sed 's|.*:||' | sort -u)

          # Remove any tracked assets not in the referenced set
          for f in www/assets/*.js www/assets/*.css; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            echo "$REFERENCED" | grep -qx "$BASENAME" || git rm -f "$f" 2>/dev/null || true
          done

          git add www/index.html www/assets/ -f
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build web UI from www-next/ sources

          [skip ci]"
            git pull --rebase origin main
            git push
          fi
