name: Build l2tap

on:
  push:
    branches: [main]
    paths:
      - 'l2tap/**'
      - '.github/workflows/build-l2tap.yml'
  pull_request:
    branches: [main]
    paths:
      - 'l2tap/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install aarch64 cross toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build for aarch64
        working-directory: l2tap
        run: make cross CROSS_CC=aarch64-linux-gnu-gcc

      - name: Verify binary
        working-directory: l2tap
        run: |
          file l2tap-aarch64
          ls -la l2tap-aarch64

      - name: Copy to packages
        run: |
          mkdir -p packages/common
          cp l2tap/l2tap-aarch64 packages/common/l2tap-aarch64

      - name: Commit binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/common/l2tap-aarch64 -f
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build l2tap-aarch64 binary

          [skip ci]"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: l2tap-aarch64
          path: l2tap/l2tap-aarch64
